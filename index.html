<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нации и их иконки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .nations-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .nation-card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 15px;
            width: 150px;
            text-align: center;
            transition: transform 0.3s;
        }

        .nation-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .nation-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
            background-color: #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .nation-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nation-name {
            font-weight: bold;
            margin: 5px 0;
            color: #333;
        }

        .nation-name-eng {
            font-size: 0.8em;
            color: #777;
            margin-bottom: 5px;
        }

        .nation-name-ru {
            font-size: 0.9em;
            color: #555;
        }

        .no-icon {
            color: #999;
            font-size: 0.7em;
        }
    </style>
</head>
<body>

<div class="nations-container" id="nationsContainer">
    <!-- Нации будут загружены сюда через JavaScript -->

    // Функция для форматирования имени файла (замена пробелов и специальных символов)
    function formatFileName(name) {
        return name.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
    }

    // Контейнер для отображения наций
    const container = document.getElementById('nationsContainer');

    // Создаем карточки для каждой нации
    nations.forEach(nation => {
        const card = document.createElement('div');
        card.className = 'nation-card';

        const fileName = formatFileName(nation.eng);
        const iconPath = `Nation_icons/${fileName}.png`; // Обратите внимание: папка переименована в Nation_icons

        // Создаем HTML для карточки
        card.innerHTML = `
            <div class="nation-icon">
                <img src="${iconPath}" alt="${nation.eng}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'no-icon\'>Нет иконки</div>';">
            </div>
            <div class="nation-name">
                <div class="nation-name-eng">${nation.eng}</div>
                <div class="nation-name-ru">${nation.rus}</div>
            </div>
        `;

        container.appendChild(card);
    });
